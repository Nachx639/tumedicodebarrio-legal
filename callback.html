<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TikTok OAuth Callback</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f5f5f5; }
        .card { background: white; border-radius: 12px; padding: 32px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .success { color: #4caf50; font-size: 48px; }
        h2 { margin: 16px 0 8px; }
        p { color: #666; }
        a { color: #00f2ea; }
    </style>
</head>
<body>
    <div class="card">
        <div class="success">✓</div>
        <h2>Authorization Successful</h2>
        <p>Redirecting to the publisher...</p>
        <p><a href="app.html">Click here if not redirected</a></p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        if (code) {
            setTimeout(() => {
                window.location.href = `app.html?code=${code}`;
            }, 2000);
        }
    </script>
</body>
</html>
